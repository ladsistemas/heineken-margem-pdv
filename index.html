<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora de Margem | Heineken</title>
    <meta name="description" content="Compare margens entre Heineken, Amstel, Original e Antártica">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>">
    <style>
        :root {
            --heineken-green: #00843D;
            --heineken-dark: #006B31;
            --amstel-red: #C8102E;
            --amstel-dark: #A30D25;
            --original-gold: #C4953A;
            --original-dark: #A07A2E;
            --antartica-blue: #003DA5;
            --antartica-dark: #002D7A;
            --bg: #F5F5F0;
            --card-bg: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #6B6B6B;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --gain-green: #00A651;
            --loss-red: #E53935;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: linear-gradient(135deg, var(--heineken-green), var(--heineken-dark));
            color: white;
            padding: 20px 16px 24px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,132,61,0.3);
        }

        .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
        .header p { font-size: 12px; opacity: 0.85; }

        .content { padding: 0 16px 40px; }

        /* Section divider */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            margin-bottom: 12px;
        }

        .section-title .line {
            flex: 1;
            height: 2px;
            border-radius: 1px;
        }

        .section-title .label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .section-title.heineken .line { background: var(--heineken-green); }
        .section-title.heineken .label { color: var(--heineken-green); }
        .section-title.amstel .line { background: var(--amstel-red); }
        .section-title.amstel .label { color: var(--amstel-red); }

        /* Product Cards */
        .products-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 12px;
            box-shadow: var(--shadow);
            border-top: 4px solid;
        }

        .product-card.heineken { border-color: var(--heineken-green); }
        .product-card.original { border-color: var(--original-gold); }
        .product-card.amstel { border-color: var(--amstel-red); }
        .product-card.antartica { border-color: var(--antartica-blue); }

        .product-card .brand { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .product-card.heineken .brand { color: var(--heineken-green); }
        .product-card.original .brand { color: var(--original-gold); }
        .product-card.amstel .brand { color: var(--amstel-red); }
        .product-card.antartica .brand { color: var(--antartica-blue); }

        .product-card .subtitle {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field { margin-bottom: 10px; }
        .field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }

        .field input {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #E0E0E0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            background: #FAFAFA;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .field input:focus { outline: none; border-color: var(--heineken-green); background: white; }

        .field .unit-price { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-weight: 500; }
        .field .unit-price span { font-weight: 700; color: var(--text); }

        /* Quantity */
        .qty-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-card .qty-info { flex: 1; }
        .qty-card .qty-info label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .qty-card .qty-info .helper { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        .qty-card input {
            width: 110px;
            padding: 10px;
            border: 1.5px solid #E0E0E0;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            background: #FAFAFA;
            -webkit-appearance: none;
        }

        .qty-card input:focus { outline: none; border-color: var(--heineken-green); background: white; }

        /* Results */
        .results { margin-top: 14px; }

        .result-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
        }

        .margin-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .margin-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .margin-card .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .margin-card .value { font-size: 22px; font-weight: 800; }
        .margin-card .percent { font-size: 12px; font-weight: 600; margin-top: 2px; }

        .margin-card.heineken .value { color: var(--heineken-green); }
        .margin-card.original .value { color: var(--original-gold); }
        .margin-card.amstel .value { color: var(--amstel-red); }
        .margin-card.antartica .value { color: var(--antartica-blue); }

        /* Highlight */
        .highlight-card {
            background: linear-gradient(135deg, #00843D, #00A651);
            border-radius: var(--radius);
            padding: 18px;
            margin-top: 10px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 24px rgba(0,132,61,0.25);
        }

        .highlight-card.negative {
            background: linear-gradient(135deg, #C8102E, #E53935);
            box-shadow: 0 8px 24px rgba(200,16,46,0.25);
        }

        .highlight-card .hl-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; margin-bottom: 4px; }
        .highlight-card .hl-diff-unit { font-size: 15px; font-weight: 600; opacity: 0.95; }
        .highlight-card .hl-total { font-size: 34px; font-weight: 800; margin: 4px 0; line-height: 1; }
        .highlight-card .hl-desc { font-size: 12px; opacity: 0.85; }

        /* Bars */
        .visual-compare {
            margin-top: 10px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
        }

        .visual-compare .vc-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }

        .bar-group { margin-bottom: 10px; }
        .bar-group:last-child { margin-bottom: 0; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .bar-track { height: 26px; background: #F0F0F0; border-radius: 6px; overflow: hidden; }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }

        .bar-fill.heineken { background: var(--heineken-green); }
        .bar-fill.original { background: var(--original-gold); }
        .bar-fill.amstel { background: var(--amstel-red); }
        .bar-fill.antartica { background: var(--antartica-blue); }

        /* Breakdown */
        .breakdown {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px;
            margin-top: 10px;
            box-shadow: var(--shadow);
        }

        .breakdown-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .breakdown-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #F0F0F0; }
        .breakdown-row:last-child { border-bottom: none; }
        .breakdown-row .br-label { color: var(--text-muted); }
        .breakdown-row .br-value { font-weight: 700; }
        .breakdown-row .br-value.positive { color: var(--gain-green); }
        .breakdown-row .br-value.negative { color: var(--loss-red); }

        /* Divider between sections */
        .section-divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #D0D0D0, transparent);
            margin: 24px 0 0;
        }

        /* Reset */
        .btn-reset {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: 1.5px solid #E0E0E0;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-reset:active { background: #F0F0F0; }

        /* Empty */
        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 36px; margin-bottom: 8px; }
        .empty-state p { font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="header">
    <h1>CALCULADORA DE MARGEM</h1>
    <p>Compare e mostre o ganho real ao seu cliente</p>
</div>

<div class="content">

    <!-- SEÇÃO 1: HEINEKEN x ORIGINAL -->
    <div class="section-title heineken">
        <div class="line"></div>
        <span class="label">Heineken x Original</span>
        <div class="line"></div>
    </div>

    <div class="products-row">
        <div class="product-card heineken">
            <div class="brand">Heineken</div>
            <div class="subtitle">Premium</div>
            <div class="field">
                <label>Custo caixa (24un)</label>
                <input type="tel" id="h-custo" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('heineken')">
                <div class="unit-price">Unit.: <span id="h-custo-unit">R$ 0,00</span></div>
            </div>
            <div class="field">
                <label>Venda unitário</label>
                <input type="tel" id="h-venda" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('heineken')">
            </div>
        </div>
        <div class="product-card original">
            <div class="brand">Original</div>
            <div class="subtitle">Mainstream</div>
            <div class="field">
                <label>Custo caixa (24un)</label>
                <input type="tel" id="o-custo" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('heineken')">
                <div class="unit-price">Unit.: <span id="o-custo-unit">R$ 0,00</span></div>
            </div>
            <div class="field">
                <label>Venda unitário</label>
                <input type="tel" id="o-venda" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('heineken')">
            </div>
        </div>
    </div>

    <div class="qty-card">
        <div class="qty-info">
            <label>Qtd vendida (un/mês)</label>
            <div class="helper">Heineken x Original</div>
        </div>
        <input type="tel" id="h-qty" placeholder="0" oninput="calculate('heineken')">
    </div>

    <div class="results" id="results-heineken"></div>

    <!-- DIVISOR -->
    <div class="section-divider"></div>

    <!-- SEÇÃO 2: AMSTEL x ANTÁRTICA -->
    <div class="section-title amstel">
        <div class="line"></div>
        <span class="label">Amstel x Antártica</span>
        <div class="line"></div>
    </div>

    <div class="products-row">
        <div class="product-card amstel">
            <div class="brand">Amstel</div>
            <div class="subtitle">Premium Lager</div>
            <div class="field">
                <label>Custo caixa (24un)</label>
                <input type="tel" id="a-custo" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('amstel')">
                <div class="unit-price">Unit.: <span id="a-custo-unit">R$ 0,00</span></div>
            </div>
            <div class="field">
                <label>Venda unitário</label>
                <input type="tel" id="a-venda" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('amstel')">
            </div>
        </div>
        <div class="product-card antartica">
            <div class="brand">Antártica</div>
            <div class="subtitle">Popular</div>
            <div class="field">
                <label>Custo caixa (24un)</label>
                <input type="tel" id="ant-custo" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('amstel')">
                <div class="unit-price">Unit.: <span id="ant-custo-unit">R$ 0,00</span></div>
            </div>
            <div class="field">
                <label>Venda unitário</label>
                <input type="tel" id="ant-venda" placeholder="R$ 0,00" oninput="formatMoney(this); calculate('amstel')">
            </div>
        </div>
    </div>

    <div class="qty-card">
        <div class="qty-info">
            <label>Qtd vendida (un/mês)</label>
            <div class="helper">Amstel x Antártica</div>
        </div>
        <input type="tel" id="a-qty" placeholder="0" oninput="calculate('amstel')">
    </div>

    <div class="results" id="results-amstel"></div>

    <button class="btn-reset" onclick="resetAll()">Limpar todos os campos</button>

</div>

<script>
    function parseMoney(str) {
        if (!str) return 0;
        return parseFloat(str.replace(/[^\d]/g, '')) / 100;
    }

    function formatMoney(input) {
        let val = input.value.replace(/[^\d]/g, '');
        if (!val) { input.value = ''; return; }
        val = (parseInt(val) / 100).toFixed(2);
        input.value = 'R$ ' + val.replace('.', ',');
    }

    function fmtBRL(n) {
        return 'R$ ' + n.toFixed(2).replace('.', ',');
    }

    function fmtPct(n) {
        return n.toFixed(1).replace('.', ',') + '%';
    }

    function calculate(type) {
        if (type === 'heineken') {
            const hCusto = parseMoney(document.getElementById('h-custo').value);
            const hVenda = parseMoney(document.getElementById('h-venda').value);
            const oCusto = parseMoney(document.getElementById('o-custo').value);
            const oVenda = parseMoney(document.getElementById('o-venda').value);
            const qty = parseInt(document.getElementById('h-qty').value) || 0;

            const hUnit = hCusto / 24;
            const oUnit = oCusto / 24;

            document.getElementById('h-custo-unit').textContent = hCusto ? fmtBRL(hUnit) : 'R$ 0,00';
            document.getElementById('o-custo-unit').textContent = oCusto ? fmtBRL(oUnit) : 'R$ 0,00';

            if (!hCusto || !hVenda || !oCusto || !oVenda) {
                document.getElementById('results-heineken').innerHTML = renderEmpty();
                return;
            }

            const hMargin = hVenda - hUnit;
            const oMargin = oVenda - oUnit;
            const hPct = (hMargin / hVenda) * 100;
            const oPct = (oMargin / oVenda) * 100;
            const diffUnit = hMargin - oMargin;
            const diffTotal = diffUnit * qty;
            const isPositive = diffUnit >= 0;

            document.getElementById('results-heineken').innerHTML = renderResults({
                brand1: 'Heineken', class1: 'heineken',
                brand2: 'Original', class2: 'original',
                margin1: hMargin, margin2: oMargin,
                pct1: hPct, pct2: oPct,
                diffUnit, diffTotal, qty, isPositive
            });
        } else {
            const aCusto = parseMoney(document.getElementById('a-custo').value);
            const aVenda = parseMoney(document.getElementById('a-venda').value);
            const antCusto = parseMoney(document.getElementById('ant-custo').value);
            const antVenda = parseMoney(document.getElementById('ant-venda').value);
            const qty = parseInt(document.getElementById('a-qty').value) || 0;

            const aUnit = aCusto / 24;
            const antUnit = antCusto / 24;

            document.getElementById('a-custo-unit').textContent = aCusto ? fmtBRL(aUnit) : 'R$ 0,00';
            document.getElementById('ant-custo-unit').textContent = antCusto ? fmtBRL(antUnit) : 'R$ 0,00';

            if (!aCusto || !aVenda || !antCusto || !antVenda) {
                document.getElementById('results-amstel').innerHTML = renderEmpty();
                return;
            }

            const aMargin = aVenda - aUnit;
            const antMargin = antVenda - antUnit;
            const aPct = (aMargin / aVenda) * 100;
            const antPct = (antMargin / antVenda) * 100;
            const diffUnit = aMargin - antMargin;
            const diffTotal = diffUnit * qty;
            const isPositive = diffUnit >= 0;

            document.getElementById('results-amstel').innerHTML = renderResults({
                brand1: 'Amstel', class1: 'amstel',
                brand2: 'Antártica', class2: 'antartica',
                margin1: aMargin, margin2: antMargin,
                pct1: aPct, pct2: antPct,
                diffUnit, diffTotal, qty, isPositive
            });
        }
    }

    function renderEmpty() {
        return `
            <div class="empty-state">
                <div class="icon">📊</div>
                <p>Preencha os valores de custo e venda<br>para ver a comparação</p>
            </div>
        `;
    }

    function renderResults({ brand1, class1, brand2, class2, margin1, margin2, pct1, pct2, diffUnit, diffTotal, qty, isPositive }) {
        const maxMargin = Math.max(margin1, margin2, 0.01);
        const bar1Width = Math.min((margin1 / maxMargin) * 100, 100);
        const bar2Width = Math.min((margin2 / maxMargin) * 100, 100);

        const highlightLabel = isPositive
            ? `GANHO A MAIS COM ${brand1.toUpperCase()}`
            : `${brand2.toUpperCase()} DÁ MAIS MARGEM`;

        const hlDesc = qty > 0
            ? `em ${qty.toLocaleString('pt-BR')} unidades vendidas`
            : 'informe a quantidade para ver o total';

        return `
            <div class="result-header">Comparativo de Margem</div>

            <div class="margin-cards">
                <div class="margin-card ${class1}">
                    <div class="label">${brand1}</div>
                    <div class="value">${fmtBRL(margin1)}</div>
                    <div class="percent">margem ${fmtPct(pct1)}</div>
                </div>
                <div class="margin-card ${class2}">
                    <div class="label">${brand2}</div>
                    <div class="value">${fmtBRL(margin2)}</div>
                    <div class="percent">margem ${fmtPct(pct2)}</div>
                </div>
            </div>

            <div class="visual-compare">
                <div class="vc-title">Margem por unidade</div>
                <div class="bar-group">
                    <div class="bar-label">
                        <span>${brand1}</span>
                        <span>${fmtBRL(margin1)}</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill ${class1}" style="width: ${bar1Width}%"></div>
                    </div>
                </div>
                <div class="bar-group">
                    <div class="bar-label">
                        <span>${brand2}</span>
                        <span>${fmtBRL(margin2)}</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill ${class2}" style="width: ${bar2Width}%"></div>
                    </div>
                </div>
            </div>

            <div class="highlight-card ${isPositive ? '' : 'negative'}">
                <div class="hl-label">${highlightLabel}</div>
                <div class="hl-diff-unit">${fmtBRL(Math.abs(diffUnit))} por unidade</div>
                ${qty > 0 ? `<div class="hl-total">${fmtBRL(Math.abs(diffTotal))}</div>` : ''}
                <div class="hl-desc">${hlDesc}</div>
            </div>

            ${qty > 0 ? `
            <div class="breakdown">
                <div class="breakdown-title">Detalhamento</div>
                <div class="breakdown-row">
                    <span class="br-label">Lucro total ${brand1}</span>
                    <span class="br-value">${fmtBRL(margin1 * qty)}</span>
                </div>
                <div class="breakdown-row">
                    <span class="br-label">Lucro total ${brand2}</span>
                    <span class="br-value">${fmtBRL(margin2 * qty)}</span>
                </div>
                <div class="breakdown-row">
                    <span class="br-label">Diferença no período</span>
                    <span class="br-value ${isPositive ? 'positive' : 'negative'}">${isPositive ? '+' : '-'} ${fmtBRL(Math.abs(diffTotal))}</span>
                </div>
            </div>
            ` : ''}
        `;
    }

    function resetAll() {
        ['h-custo', 'h-venda', 'o-custo', 'o-venda', 'h-qty', 'a-custo', 'a-venda', 'ant-custo', 'ant-venda', 'a-qty'].forEach(id => {
            document.getElementById(id).value = '';
        });
        ['h-custo-unit', 'o-custo-unit', 'a-custo-unit', 'ant-custo-unit'].forEach(id => {
            document.getElementById(id).textContent = 'R$ 0,00';
        });
        document.getElementById('results-heineken').innerHTML = '';
        document.getElementById('results-amstel').innerHTML = '';
    }
</script>

</body>
</html>
